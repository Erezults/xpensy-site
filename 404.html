<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Xpensy</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/images/app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #08060e;
      --bg-glass: rgba(255,255,255,0.04);
      --border-glass: rgba(255,255,255,0.08);
      --purple: #8b5cf6;
      --purple-bright: #a78bfa;
      --purple-glow: rgba(139,92,246,0.25);
      --cyan: #22d3ee;
      --text: #f1f0f5;
      --text-secondary: rgba(241,240,245,0.55);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-deep); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; overflow: hidden; -webkit-font-smoothing: antialiased;
    }
    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(99,102,241,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 70% 80%, rgba(139,92,246,0.1), transparent);
    }
    .card { position: relative; z-index: 2; text-align: center; max-width: 480px; }
    .code {
      font-family: 'Outfit', sans-serif; font-size: clamp(96px, 20vw, 160px); font-weight: 900;
      line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--purple-bright), var(--cyan));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    h1 { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700; margin: 16px 0 12px; }
    p { color: var(--text-secondary); font-size: 15px; line-height: 1.7; margin-bottom: 36px; }
    .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; background: var(--text); color: var(--bg-deep);
      padding: 14px 30px; border-radius: 50px; text-decoration: none;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,255,255,0.15); }
    .btn-ghost {
      display: inline-flex; align-items: center; background: var(--bg-glass); color: var(--text);
      border: 1px solid var(--border-glass); padding: 14px 30px; border-radius: 50px; text-decoration: none;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; transition: all 0.3s ease;
    }
    .btn-ghost:hover { border-color: var(--purple); box-shadow: 0 0 24px var(--purple-glow); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Back to Xpensy</a>
      <a href="/support.html" class="btn-ghost">Support</a>
    </div>
  </div>
</body>
</html>
